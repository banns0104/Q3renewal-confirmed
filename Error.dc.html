<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable.css">
<style>.af-err *{box-sizing:border-box;} .af-err{font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;}</style>
</helmet>
<div class="af-err" style="width:393px; height:852px; background:#ffffff; position:relative; overflow:hidden; display:flex; flex-direction:column;">

  <!-- status bar -->
  <div style="height:54px; width:100%; display:flex; align-items:center; justify-content:space-between; padding:8px 22px 0 34px; flex:none;">
    <span style="font-family:'SF Pro Display',-apple-system,sans-serif; font-weight:600; font-size:16px; color:#191919;">8:00</span>
    <div style="display:flex; align-items:center; gap:6px;">
      <svg width="18" height="12" viewBox="0 0 18 12"><g fill="#191919"><rect x="0" y="7" width="3" height="5" rx="1"></rect><rect x="5" y="5" width="3" height="7" rx="1"></rect><rect x="10" y="2.5" width="3" height="9.5" rx="1"></rect><rect x="15" y="0" width="3" height="12" rx="1"></rect></g></svg>
      <span style="font-weight:600; font-size:14px; color:#191919;">5G</span>
      <div style="width:24px; height:12px; border:1.4px solid #191919; border-radius:3px; position:relative; opacity:.85;"><div style="position:absolute; left:1.6px; top:1.6px; bottom:1.6px; width:15px; background:#191919; border-radius:1px;"></div></div>
    </div>
  </div>

  <!-- top bar: back + close -->
  <div style="height:56px; flex:none; display:flex; align-items:center; justify-content:space-between; padding:0 18px;">
    <div style="width:28px; height:28px; display:flex; align-items:center; justify-content:center;"><svg width="11" height="20" viewBox="0 0 11 20"><path d="M10 1 1.5 10 10 19" fill="none" stroke="#191919" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div>
    <div style="display:flex; align-items:baseline; gap:2px; white-space:nowrap;"><span style="font-family:'Pretendard Variable',sans-serif; font-weight:800; font-size:20px; letter-spacing:-0.6px; color:#363636;">어바웃피싱</span><span style="width:5px; height:5px; border-radius:50%; background:#6433DF; display:inline-block; transform:translateY(-1px);"></span></div>
    <div style="width:28px; height:28px;"></div>
  </div>

  <!-- body -->
  <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px 80px;">
    <div style="position:relative; width:160px; height:140px; display:flex; align-items:center; justify-content:center; margin-bottom:8px;">
      <div style="width:96px; height:96px; border-radius:50%; background:{{ tint }}; display:flex; align-items:center; justify-content:center;">
        {{ iconEl }}
      </div>
      
    </div>
    <div style="margin-top:14px; font-weight:700; font-size:20px; color:#191919; letter-spacing:-0.5px; text-align:center;">{{ message }}</div>
    <div style="margin-top:12px; font-weight:500; font-size:14px; line-height:1.6; color:#999; letter-spacing:-0.4px; text-align:center; white-space:pre-line;">{{ sub }}</div>

    <sc-if value="{{ hasInfo }}" hint-placeholder-val="{{ false }}">
      <div style="margin-top:20px; padding:12px 18px; border-radius:12px; background:#F8F8F8; font-weight:600; font-size:13.5px; color:#363636; letter-spacing:-0.4px;">{{ info }}</div>
    </sc-if>

    <div style="margin-top:32px; display:flex; flex-direction:column; align-items:center; gap:14px; width:100%;">
      <div onClick="{{ ctaClick }}" style="height:52px; width:100%; max-width:280px; border-radius:1000px; background:{{ ctaBg }}; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:15.5px; color:{{ ctaColor }}; letter-spacing:-0.4px; cursor:pointer;">{{ ctaLabel }}</div>
      <sc-if value="{{ hasSubCta }}" hint-placeholder-val="{{ false }}">
        <div onClick="{{ subCtaClick }}" style="font-weight:500; font-size:14px; color:#999; letter-spacing:-0.4px; text-decoration:underline; text-underline-offset:3px; cursor:pointer;">{{ subCtaLabel }}</div>
      </sc-if>
    </div>
  </div>

  <div style="position:absolute; left:50%; bottom:8px; transform:translateX(-50%); width:134px; height:5px; border-radius:3px; background:#191919;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:393,&quot;height&quot;:852},&quot;type&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;404&quot;,&quot;500&quot;,&quot;network&quot;,&quot;maintenance&quot;],&quot;default&quot;:&quot;404&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  cfg = {
    "404": { code:"404", tint:"#EAF0FF", icon:"hook", message:"페이지를 찾을 수 없어요",
      sub:"주소가 바뀌었거나 삭제된 페이지예요.\n입력하신 주소가 정확한지 확인해주세요.",
      cta:"홈으로 가기", ctaPrimary:true, ctaTo:"chuljo", subCta:"이전 화면으로", subTo:"back" },
    "500": { code:"500", tint:"#FFECEC", icon:"alert", message:"일시적인 오류가 발생했어요",
      sub:"잠시 후 다시 시도해주세요.\n문제가 계속되면 고객센터로 문의해주세요.",
      cta:"다시 시도하기", ctaPrimary:true, ctaTo:"back", subCta:"고객센터 문의", subTo:"noop" },
    network: { code:"", tint:"#F3F3F3", icon:"wifi", message:"인터넷 연결이 불안정해요",
      sub:"Wi-Fi 또는 데이터 연결 상태를 확인하고\n다시 시도해주세요.",
      cta:"다시 시도하기", ctaPrimary:true, ctaTo:"back" },
    maintenance: { code:"", tint:"#F5EDFF", icon:"wrench", message:"서비스 점검 중이에요",
      sub:"더 나은 어바웃피싱을 위해\n시스템을 점검하고 있어요.",
      info:"점검 시간  2025.08.15 02:00 ~ 06:00",
      cta:"공지사항 확인하기", ctaPrimary:false, ctaTo:"noop" },
  };

  nav(to){ return () => { try{ window.postMessage({ type:"af-nav", to }, "*"); if(window.parent&&window.parent!==window) window.parent.postMessage({ type:"af-nav", to }, "*"); }catch(e){} }; }

  icon(name){
    const R = React.createElement;
    const p = (d, stroke, extra={}) => R("path", Object.assign({ d, fill:"none", stroke, strokeWidth:2.2, strokeLinecap:"round", strokeLinejoin:"round" }, extra));
    const svg = (children) => R("svg", { width:40, height:40, viewBox:"0 0 40 40" }, children);
    switch(name){
      case "hook": return svg([
        p("M22 8 L22 22 C22 27 18 30 14 30 C10.5 30 8 27.5 8 24",[].length, ),
      ]) || null;
      default: return null;
    }
  }

  renderIcon(name){
    const R = React.createElement;
    const svg = (children) => R("svg", { width:40, height:40, viewBox:"0 0 40 40" }, children);
    const ln = (d, stroke, w=2.3) => R("path", { d, fill:"none", stroke, strokeWidth:w, strokeLinecap:"round", strokeLinejoin:"round" });
    switch(name){
      case "hook": return svg([
        ln("M23 7 L23 23 C23 27.4 19.4 31 15 31 C10.6 31 7 27.4 7 23 L7 21", "#0041FF"),
        R("circle",{key:"e",cx:23,cy:7,r:2.6,fill:"#0041FF"}),
        R("path",{key:"b",d:"M11 31 C8 31 6 33 6 33",fill:"none",stroke:"#0041FF",strokeWidth:2.3,strokeLinecap:"round"})
      ]);
      case "alert": return svg([
        R("path",{key:1,d:"M20 6 L35 32 L5 32 Z",fill:"none",stroke:"#EE0005",strokeWidth:2.3,strokeLinejoin:"round"}),
        R("path",{key:2,d:"M20 16 L20 24",stroke:"#EE0005",strokeWidth:2.3,strokeLinecap:"round"}),
        R("circle",{key:3,cx:20,cy:28,r:1.5,fill:"#EE0005"})
      ]);
      case "wifi": return svg([
        ln("M7 17 C15 10 25 10 33 17", "#767676"),
        ln("M12 22 C16.5 18 23.5 18 28 22", "#767676"),
        ln("M17 27 C18.7 25.5 21.3 25.5 23 27", "#767676"),
        R("circle",{key:4,cx:20,cy:31,r:1.6,fill:"#767676"}),
        R("path",{key:5,d:"M6 6 L34 34",stroke:"#767676",strokeWidth:2.3,strokeLinecap:"round"})
      ]);
      case "wrench": return svg([
        ln("M26 9 C22 9 19 12 19 16 C19 17 19.2 18 19.5 18.8 L9 29.3 C8 30.3 8 31.9 9 32.9 C10 33.9 11.6 33.9 12.6 32.9 L23.1 22.4 C24 22.7 25 22.9 26 22.9 C30 22.9 33 19.9 33 15.9 C33 14.6 32.7 13.4 32.1 12.4 L28 16.5 L25.4 13.9 L29.5 9.8 C28.5 9.3 27.3 9 26 9 Z","#6433DF")
      ]);
      default: return null;
    }
  }

  renderVals(){
    const t = this.props.type || "404";
    const c = this.cfg[t] || this.cfg["404"];
    return {
      code: c.code, hasCode: !!c.code, tint: c.tint,
      iconEl: this.renderIcon(c.icon),
      message: c.message, sub: c.sub,
      hasInfo: !!c.info, info: c.info || "",
      ctaLabel: c.cta, ctaClick: this.nav(c.ctaTo || "noop"),
      ctaBg: c.ctaPrimary ? "#0041FF" : "#191919",
      ctaColor: "#fff",
      hasSubCta: !!c.subCta, subCtaLabel: c.subCta || "", subCtaClick: this.nav(c.subTo || "noop"),
    };
  }
}
</script>
</body>
</html>
