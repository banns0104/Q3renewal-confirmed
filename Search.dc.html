<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/variable/pretendardvariable.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@1.3.9/dist/web/static/pretendard.css">
<style>.af-sc *{box-sizing:border-box;} .af-sc{font-family:"Pretendard Variable","Pretendard",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;} .tap{cursor:pointer;transition:transform .1s ease;} .tap:active{transform:scale(.99);}</style>
</helmet>
<div class="af-sc" style="width:393px; min-height:852px; background:#fff; position:relative;">
  <div style="height:48px; display:flex; align-items:center; justify-content:space-between; padding:6px 22px 0 30px;">
    <span style="font-family:'SF Pro Display',sans-serif; font-weight:600; font-size:16px; color:#191919;">8:00</span>
    <div style="display:flex; align-items:center; gap:6px;"><svg width="18" height="12" viewBox="0 0 18 12"><g fill="#191919"><rect x="0" y="7" width="3" height="5" rx="1"></rect><rect x="5" y="5" width="3" height="7" rx="1"></rect><rect x="10" y="2.5" width="3" height="9.5" rx="1"></rect><rect x="15" y="0" width="3" height="12" rx="1"></rect></g></svg><span style="font-weight:600; font-size:14px; color:#191919;">5G</span><div style="width:24px; height:12px; border:1.4px solid #191919; border-radius:3px; position:relative; opacity:.85;"><div style="position:absolute; left:1.6px; top:1.6px; bottom:1.6px; width:15px; background:#191919; border-radius:1px;"></div></div></div>
  </div>
  <!-- search bar -->
  <div style="height:56px; display:flex; align-items:center; gap:11px; padding:0 18px;">
    <div class="tap" onClick="{{ back }}" style="width:26px; height:26px; display:flex; align-items:center; justify-content:center;"><svg width="11" height="20" viewBox="0 0 11 20"><path d="M10 1 1.5 10 10 19" fill="none" stroke="#191919" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg></div>
    <div style="flex:1; height:42px; border-radius:1000px; background:#F3F3F3; display:flex; align-items:center; padding:0 14px; gap:9px;"><svg width="17" height="17" viewBox="0 0 20 20"><circle cx="9" cy="9" r="6.2" fill="none" stroke="#888" stroke-width="1.8"></circle><path d="M13.5 13.5 18 18" stroke="#888" stroke-width="1.8" stroke-linecap="round"></path></svg><span style="flex:1; font-weight:600; font-size:15px; color:#191919; letter-spacing:-0.3px;">갈치</span><svg class="tap" width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="7" fill="#CFCFCF"></circle><path d="M5.5 5.5 10.5 10.5 M10.5 5.5 5.5 10.5" stroke="#fff" stroke-width="1.4" stroke-linecap="round"></path></svg></div>
  </div>
  <!-- tabs -->
  <div style="display:flex; gap:20px; padding:6px 20px 0; border-bottom:1px solid #F0F0F0;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="5"><div class="tap" onClick="{{ t.onClick }}" style="padding-bottom:11px; border-bottom:2px solid {{ t.line }}; font-weight:{{ t.weight }}; font-size:14.5px; color:{{ t.color }}; letter-spacing:-0.3px;">{{ t.label }}</div></sc-for>
  </div>

  <!-- 어종 정보 -->
  <sc-if value="{{ showFish }}" hint-placeholder-val="{{ true }}">
  <div style="padding:18px 20px 0;"><div style="font-weight:800; font-size:15px; color:#191919; letter-spacing:-0.4px;">어종 정보</div>
    <div class="tap" onClick="{{ noop }}" style="margin-top:12px; display:flex; gap:14px; padding:14px; border-radius:14px; background:#F5F9FF;">
      <div style="width:64px; height:64px; border-radius:12px; background:#DDE9F5; display:flex; align-items:center; justify-content:center; flex:none;"><svg width="34" height="22" viewBox="0 0 44 28"><path d="M6 14 C14 5 30 5 38 14 C30 23 14 23 6 14Z M38 14 L44 10 M38 14 L44 18" fill="none" stroke="#5A8FC0" stroke-width="1.6"></path></svg></div>
      <div style="flex:1;"><div style="font-weight:700; font-size:15px; color:#191919;">갈치 <span style="font-weight:500; font-size:12px; color:#999;">Hairtail</span></div><div style="margin-top:5px; display:flex; gap:6px; flex-wrap:wrap;"><span style="height:20px; padding:0 8px; border-radius:5px; background:#E8FBEE; color:#1F8A5B; font-weight:700; font-size:10.5px; display:flex; align-items:center;">제철 9~11월</span><span style="height:20px; padding:0 8px; border-radius:5px; background:#F3F3F3; color:#767676; font-weight:600; font-size:10.5px; display:flex; align-items:center;">평균 80~100cm</span></div><div style="margin-top:7px; font-weight:500; font-size:12px; line-height:1.5; color:#888; letter-spacing:-0.3px;">남해·서해 먼바다 선상에서 주로 잡혀요. 야간 집어등 조황이 좋아요.</div></div>
    </div>
  </div>
  </sc-if>

  <!-- 선박 결과 -->
  <sc-if value="{{ showBoat }}" hint-placeholder-val="{{ true }}">
  <div style="padding:20px 20px 0;"><div style="display:flex; align-items:center; justify-content:space-between;"><span style="font-weight:800; font-size:15px; color:#191919; letter-spacing:-0.4px;">선박 <span style="color:#0041FF;">24</span></span><span class="tap" onClick="{{ noop }}" style="font-weight:600; font-size:12.5px; color:#999;">정확도순 ▾</span></div>
    <sc-for list="{{ boats }}" as="b" hint-placeholder-count="3">
      <div class="tap" onClick="{{ b.onClick }}" style="display:flex; gap:13px; padding:15px 0; border-bottom:1px solid #F4F4F4;">
        <div style="position:relative; width:80px; height:80px; border-radius:12px; background:#E9ECF1; flex:none; overflow:hidden;"><sc-if value="{{ b.live }}" hint-placeholder-val="{{ false }}"><span style="position:absolute; left:0; top:0; height:19px; padding:0 7px; background:#EE0005; color:#fff; font-weight:700; font-size:9.5px; display:flex; align-items:center; border-radius:0 0 7px 0;">실시간</span></sc-if></div>
        <div style="flex:1;"><div style="font-weight:700; font-size:15px; color:#191919; letter-spacing:-0.3px;">{{ b.name }}</div><div style="margin-top:3px; font-weight:500; font-size:12px; color:#999;">{{ b.loc }}</div><div style="margin-top:6px; font-weight:800; font-size:15px; color:#191919;">{{ b.price }}</div><div style="margin-top:6px; display:flex; gap:5px;"><sc-for list="{{ b.tags }}" as="tg" hint-placeholder-count="2"><span style="height:20px; padding:0 8px; border-radius:5px; background:#F3F3F3; color:#767676; font-weight:600; font-size:10.5px; display:flex; align-items:center;">{{ tg }}</span></sc-for></div></div>
      </div>
    </sc-for>
  </div>
  </sc-if>

  <!-- 낚시 포인트 -->
  <sc-if value="{{ showPoint }}" hint-placeholder-val="{{ true }}">
  <div style="padding:20px 20px 0;"><div style="font-weight:800; font-size:15px; color:#191919; letter-spacing:-0.4px;">낚시 포인트 <span style="color:#0041FF;">8</span></div>
    <sc-for list="{{ points }}" as="p" hint-placeholder-count="2">
      <div class="tap" onClick="{{ goMap }}" style="display:flex; align-items:center; gap:12px; padding:13px 0; border-bottom:1px solid #F4F4F4;"><div style="width:40px; height:40px; border-radius:10px; background:#EAF0FF; display:flex; align-items:center; justify-content:center; flex:none;"><svg width="20" height="20" viewBox="0 0 22 22"><path d="M11 20 C11 20 18 13 18 8.5 C18 4.9 14.9 2 11 2 C7.1 2 4 4.9 4 8.5 C4 13 11 20 11 20Z" fill="none" stroke="#0041FF" stroke-width="1.7" stroke-linejoin="round"></path><circle cx="11" cy="8.3" r="2.2" fill="#0041FF"></circle></svg></div><div style="flex:1;"><div style="font-weight:700; font-size:14px; color:#191919;">{{ p.name }}</div><div style="margin-top:3px; font-weight:500; font-size:12px; color:#999;">{{ p.meta }}</div></div><span style="font-weight:600; font-size:12px; color:#0041FF;">지도</span></div>
    </sc-for>
  </div>
  </sc-if>

  <!-- 상품 -->
  <sc-if value="{{ showProd }}" hint-placeholder-val="{{ true }}">
  <div style="padding:20px 20px 0;"><div style="font-weight:800; font-size:15px; color:#191919; letter-spacing:-0.4px;">상품 <span style="color:#0041FF;">36</span></div>
    <div style="margin-top:12px; display:flex; gap:12px; overflow-x:auto;">
      <sc-for list="{{ prods }}" as="p" hint-placeholder-count="2"><div class="tap" onClick="{{ noop }}" style="width:130px; flex:none;"><div style="width:130px; height:130px; border-radius:12px; background:#EEF1F4;"></div><div style="margin-top:8px; font-weight:600; font-size:12.5px; color:#363636; line-height:1.4;">{{ p.name }}</div><div style="margin-top:3px; font-weight:800; font-size:14px; color:#191919;">{{ p.price }}</div></div></sc-for>
    </div>
  </div>
  </sc-if>

  <div style="height:60px;"></div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:393,&quot;height&quot;:852}}">
class Component extends DCLogic {
  state = { tab:"통합" };
  nav(to){ return () => { try{ window.parent.postMessage({ type:"af-nav", to }, "*"); }catch(e){} }; }
  renderVals(){
    const t = this.state.tab;
    const all = t==="통합";
    const tab=(l)=>{ const on=t===l; return { label:l, onClick:()=>this.setState({tab:l}), line:on?"#191919":"transparent", weight:on?700:500, color:on?"#191919":"#AAA" }; };
    return {
      back:this.nav("back"), noop:this.nav("noop"), goMap:this.nav("map"),
      tabs:["통합","선박","어종","포인트","상품"].map(tab),
      showFish: all||t==="어종", showBoat: all||t==="선박", showPoint: all||t==="포인트", showProd: all||t==="상품",
      boats:[
        { name:"갈치왕 선상호", loc:"여수 국동항 · 12.4km", price:"120,000원~", tags:["갈치","먼바다"], live:true, onClick:this.nav("detail") },
        { name:"남해 보름달호", loc:"통영 삼덕항 · 18.1km", price:"95,000원~", tags:["갈치","고등어"], live:true, onClick:this.nav("detail") },
        { name:"홍원 대물호", loc:"보령 홍원항 · 22.6km", price:"110,000원~", tags:["갈치","참돔"], live:false, onClick:this.nav("detail") },
      ],
      points:[
        { name:"여수 먼바다 갈치 포인트", meta:"야간 집어등 · 수심 60~90m" },
        { name:"통영 욕지도 남단", meta:"갈치·삼치 회유 구간" },
      ],
      prods:[
        { name:"피쉬시리즈 갈치 채비 세트 (3입)", price:"32,000원" },
        { name:"갈치 전용 케미 라이트 20개입", price:"8,900원" },
      ],
    };
  }
}
</script>
</body>
</html>
